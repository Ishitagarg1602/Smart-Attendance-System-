name: smart_attendance
description: Smart Attendance System with QR + GPS Geo-Fencing
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.28.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.13
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.5.0
  
  # QR Code
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.2.0
  
  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.0.1
  location: ^5.0.0
  
  # UI & Utilities
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  image_picker: ^1.0.4
  
  # Animations
  lottie: ^2.7.0
  
  # State Management
  get: ^4.6.6
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Forms & Validation
  form_validator: ^1.1.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Date & Time
  timeago: ^3.5.0
  
  # File Handling
  file_picker: ^6.1.1
  path_provider: ^2.1.0
  
  # PDF & Export
  pdf: ^3.10.9
  printing: ^5.11.4
  csv: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  firebase_emulator_suite: ^0.3.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700