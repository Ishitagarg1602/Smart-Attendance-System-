name: smart_attendance
description: Smart Attendance System with QR + GPS Geo-Fencing
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.3.2
  
  # Firebase Cloud Functions
  cloud_functions: ^4.5.0
  
  # Authentication & UI
  google_sign_in: ^6.1.5
  flutter_secure_storage: ^9.1.2
  
  # QR Code
  qr_code_scanner: ^1.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  
  # Location & GPS
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  location: ^5.0.0
  
  # UI & Design
  get: ^4.6.6
  provider: ^6.1.1
  animated_splash_screen: ^1.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1
  syncfusion_flutter_charts: ^23.1.43
  syncfusion_flutter_datepicker: ^23.1.43
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  
  # Utilities
  uuid: ^4.3.0
  crypto: ^3.0.3
  dio: ^5.3.2
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.0
  image_picker: ^1.0.4
  
  # Maps
  google_maps_flutter: ^2.5.1
  geocoding: ^2.1.1
  
  # Charts
  fl_chart: ^0.65.0
  
  # Printing & Export
  printing: ^5.11.1
  excel: ^2.0.0-null-safety-5
  pdf: ^3.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700