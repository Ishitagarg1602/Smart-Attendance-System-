name: smart_attendance
description: Smart Attendance System with QR and GPS Geo-Fencing
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.4.1
  
  # Authentication
  firebase_auth: ^4.2.5
  
  # Cloud Firestore
  cloud_firestore: ^4.3.1
  
  # Storage
  firebase_storage: ^11.0.6
  
  # Firebase Cloud Functions
  cloud_functions: ^4.0.6
  
  # QR Code
  qr_flutter: ^4.0.0
  mobile_scanner: ^3.1.1+2
  
  # Location
  geolocator: ^10.0.0
  geocoding: ^2.1.1
  
  # UI & Navigation
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  flutter_svg: ^2.0.5
  animated_splash_screen: ^1.3.0
  
  # Charts
  fl_chart: ^0.62.0
  
  # Date/Time
  intl: ^0.18.1
  
  # HTTP Requests
  http: ^0.13.5
  
  # State Management
  get: ^4.6.5
  
  # File handling (replacing excel)
  csv: ^5.0.1
  path_provider: ^2.0.13
  
  # Encryption
  crypto: ^3.0.2
  
  # Mock location detection
  mock_location_checker: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/